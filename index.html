<!DOCTYPE html>
<html>
<head>
  <title>Carte incendies + forêts</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    #map { height: 100vh; }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
  // Centre par défaut : Bordeaux
  const center = [44.84, -0.58];
  const map = L.map('map').setView(center, 11);

  // Fond de carte OpenStreetMap
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  // 🔥 Icône incendie simulée (sans dépendre du front ni des vraies données)
  const fireIcon = L.divIcon({
    html: '<div style="background: #ef4444; color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; border: 2px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.35);">🔥</div>',
    className: '',
    iconSize: [36, 36],
    iconAnchor: [18, 18],
  });

  // On place le marqueur légèrement au nord du centre pour bien le voir
  const fireLat = center[0] + 0.01;
  const fireLon = center[1];

  L.marker([fireLat, fireLon], { icon: fireIcon })
    .addTo(map)
    .bindPopup('🔥 Risque incendie simulé pour la démo');

  // (Optionnel) Appeler ton backend pour voir les vraies données dans la console
  // mais on ne s'en sert pas pour l'affichage pour l'instant
  fetch('http://localhost:5000/api/map')
    .then(res => res.json())
    .then(data => {
      console.log('Données backend /api/map :', data);
    })
    .catch(err => {
      console.error('Erreur d\'appel backend :', err);
    });
</script>

</body>
</html>
