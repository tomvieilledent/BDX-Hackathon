<!doctype html>
<html lang="fr">
  <head>
    <title>Accueil</title>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <header>
      <div
        class="header fixed top-0 left-0 w-full h-20 bg-veille-4 z-50 flex items-center justify-center gap-x-3"
      >
        <!-- Logo -->
        <div class="flex items-center justify-center">
          <img src="images/logo.png" alt="Logo" class="logo-img h-12" />
        </div>
        <!-- Phario -->
        <div
          class="bg-veille-3 rounded-xl px-4 py-2 flex items-center justify-center"
        >
          <img src="images/phario.png" alt="Phario" class="logo-img h-10" />
        </div>
      </div>
    </header>
    <main class="min-h-screen pt-20 pb-24 bg-veille-4">
      <div class="container mx-auto px-4" id="home-content">
        <section
          class="rounded-2xl bg-veille-3 p-4 border border-white/10 mt-2"
        >
          <div class="flex items-center justify-between gap-3">
            <h2 class="text-white font-semibold">Mode démo</h2>
            <button
              id="home-demo-toggle"
              class="px-3 py-2 rounded-lg bg-veille-2 text-white font-semibold"
            >
              Activer
            </button>
          </div>
          <p class="text-white/80 text-sm mt-2">
            Affiche une alerte simulée sur l'accueil.
          </p>
        </section>
        <section
          class="rounded-2xl bg-veille-3 p-4 border border-white/10 mt-4"
        >
          <h2 class="text-white font-semibold">
            Connaître les risques près de chez moi
          </h2>
          <form
            id="address-risk-form"
            class="mt-3 flex flex-col gap-2 sm:flex-row sm:items-center"
          >
            <input
              id="address-input"
              type="text"
              list="address-suggestions"
              autocomplete="off"
              required
              placeholder="Ex: 1 place de la Bourse, Bordeaux"
              class="w-full rounded-lg p-2 bg-veille-4 text-white border border-white/20"
            />
            <datalist id="address-suggestions"></datalist>
            <button
              type="submit"
              class="px-4 py-2 rounded-lg bg-veille-2 text-white font-semibold whitespace-nowrap"
            >
              Rechercher
            </button>
          </form>
        </section>
        <section id="alerts-home-section" class="mt-4 mb-4 hidden">
          <div id="alerts-home-container"></div>
        </section>
        <section
          id="home-map-section"
          class="rounded-2xl bg-veille-3 p-4 border border-white/10 mt-4 hidden"
        >
          <div class="flex items-center justify-between gap-3 mb-3">
            <h2 class="text-white font-semibold">Carte des risques</h2>
            <p id="map-status" class="text-white/80 text-xs">Chargement...</p>
          </div>
          <div
            id="home-map"
            class="w-full rounded-xl overflow-hidden border border-white/20"
            style="height: 300px"
          ></div>
        </section>
        <section
          id="weather-home-section"
          class="rounded-2xl bg-veille-3 p-4 border border-white/10 mt-4"
        >
          <div class="flex items-center gap-3 mb-2">
            <h2 class="text-white font-semibold text-lg">Météo</h2>
          </div>
          <div id="weather-home-container" class="text-white/90"></div>
        </section>
      </div>
    </main>
    <footer>
      <!-- Navbar -->
      <div
        class="fixed bottom-0 left-0 w-full flex justify-center items-center h-20"
      >
        <div class="navbar-font bg bg-veille-4 mb-2 mx-4">
          <ul
            class="navbar bg-veille-3 flex items-center justify-center rounded-2xl"
          >
            <li
              class="navbar-home w-16 h-8 bg-veille-1 rounded-xl flex items-center justify-center m-1.5"
              aria-current="page"
            >
              <a
                href="index.html"
                class="block w-full h-full flex items-center justify-center"
              >
                <i class="fa-solid fa-house text-xl text-veille-2"></i>
              </a>
            </li>
            <li
              class="navbar-preparation w-16 h-8 bg-veille-1 rounded-xl flex items-center justify-center m-1.5"
            >
              <a
                href="preparation.html"
                class="block w-full h-full flex items-center justify-center"
              >
                <i class="fa-solid fa-shield text-xl text-white"></i>
              </a>
            </li>
            <li
              class="navbar-alert w-16 h-8 bg-veille-1 rounded-xl flex items-center justify-center m-1.5"
            >
              <a
                href="alert.html"
                class="block w-full h-full flex items-center justify-center"
              >
                <i class="fa-solid fa-bell text-xl text-white"></i>
              </a>
            </li>
            <li
              class="navbar-emergency w-16 h-8 bg-veille-1 rounded-xl flex items-center justify-center m-1.5"
            >
              <a
                href="emergency.html"
                class="block w-full h-full flex items-center justify-center"
              >
                <i class="fa-solid fa-phone text-xl text-white"></i>
              </a>
            </li>
          </ul>
        </div>
  		</div>
  	</footer>
  	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  	<script src="app.js"></script>
  </body>
  </html>
