<!doctype html>
<html lang="fr">
  <head>
    <title>Alertes</title>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <header>
      <div
        class="header fixed top-0 left-0 w-full h-20 bg-veille-4 z-50 flex items-center justify-center gap-x-3"
      >
        <!-- Logo -->
        <div class="flex items-center justify-center">
          <img src="images/logo.png" alt="Logo" class="logo-img h-12" />
        </div>
        <!-- Phario -->
        <div
          class="bg-veille-3 rounded-xl px-4 py-2 flex items-center justify-center"
        >
          <img src="images/phario.png" alt="Phario" class="logo-img h-10" />
        </div>
      </div>
    </header>

    <main class="min-h-screen pt-16 pb-24 bg-veille-4">
      <div class="container mx-auto px-4">
        <section class="rounded-2xl bg-veille-3 p-6 sm:p-8 border border-white/10 max-w-xl mx-auto">
          <h1 class="text-white text-2xl font-anton text-center">Signaler un incident</h1>
          <button
            id="refresh-alerts"
            class="mt-3 w-full px-3 py-2 rounded-lg bg-veille-2 text-white font-semibold"
          >
            Signaler
          </button>

          <div
            id="alerts-map"
            class="mt-4 w-full rounded-xl overflow-hidden border border-white/20 mx-auto"
            style="height: 320px"
          ></div>

          <div class="mt-4 flex justify-center">
            <label class="text-white/90 text-sm w-full"
              >Type
              <select
                id="mode"
                class="mt-1 w-full rounded-lg p-2 bg-veille-4 text-white border border-white/20"
              >
                <option value="Incendie">Incendie</option>
                <option value="Inondation">Inondation</option>
              </select>
            </label>
          </div>
        </section>
        <section id="alerts-container" class="mt-4 grid gap-3 max-w-md mx-auto"></section>
      </div>
    </main>

    <footer>
      <!-- Navbar -->
      <div
        class="fixed bottom-0 left-0 w-full flex justify-center items-center h-20"
      >
        <div class="navbar-font bg bg-veille-4 mb-2 mx-4">
          <ul
            class="navbar bg-veille-3 flex items-center justify-center rounded-2xl"
          >
            <li
              class="navbar-home w-16 h-8 bg-veille-1 rounded-xl flex items-center justify-center m-1.5"
            >
              <a
                href="index.html"
                class="block w-full h-full flex items-center justify-center"
              >
                <i class="fa-solid fa-house text-xl text-white"></i>
              </a>
            </li>
            <li
              class="navbar-preparation w-16 h-8 bg-veille-1 rounded-xl flex items-center justify-center m-1.5"
            >
              <a
                href="preparation.html"
                class="block w-full h-full flex items-center justify-center"
              >
                <i class="fa-solid fa-shield text-xl text-white"></i>
              </a>
            </li>
            <li
              class="navbar-alert w-16 h-8 bg-veille-1 rounded-xl flex items-center justify-center m-1.5"
              aria-current="page"
            >
              <a
                href="alert.html"
                class="block w-full h-full flex items-center justify-center"
              >
                <i class="fa-solid fa-bell text-xl text-veille-2"></i>
              </a>
            </li>
            <li
              class="navbar-emergency w-16 h-8 bg-veille-1 rounded-xl flex items-center justify-center m-1.5"
            >
              <a
                href="emergency.html"
                class="block w-full h-full flex items-center justify-center"
              >
                <i class="fa-solid fa-phone text-xl text-white"></i>
              </a>
            </li>
          </ul>
        </div>
      </div>
    </footer>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
  </body>
</html>
