<!doctype html>
<html lang="fr">

<head>
  <title>Urgence</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

<body>

          </li>
          <li class="navbar-alert w-16 h-8 bg-veille-1 rounded-xl flex items-center justify-center m-1.5">

            </a>
          </li>
          <li class="navbar-emergency w-16 h-8 bg-veille-1 rounded-xl flex items-center justify-center m-1.5"

            </span>
          </li>

    </div>

  <script src="app.js"></script>

</html>
