<!doctype html>
<html lang="fr">
  <head>
    <title>Urgence</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <header>
      <div class="header fixed top-0 left-0 w-full h-12 bg-veille-4">
        <div
          class="topbar h-12 bg-veille-3 flex rounded-2xl items-center px-4 mx-4 mt-2"
        >
          <div class="logo w-16 h- bg-transparent rounded-">
            <img src="images/logo.png" alt="#" />
          </div>
          <div
            class="title-rect flex-1 h-8 bg-veille-1 rounded-xl ml-3 flex items-center justify-center px-3"
          >
            <p class="text-lg sm:text-2xl font-anton text-white">
              Veille Bordeaux
            </p>
          </div>
        </div>
      </div>
    </header>

    <main class="min-h-screen pt-16 pb-24 bg-veille-4 mt-2">
      <div class="container mx-auto px-4">
        <section class="rounded-2xl bg-veille-3 p-4 border border-white/10">
          <h1 class="text-white text-xl font-anton">Numéros d'urgence</h1>
          <p class="text-white/70 text-sm mt-1 mb-4">
            Appelez immédiatement en cas d'urgence
          </p>

          <div class="space-y-3">
            <!-- Pompiers -->
            <div
              class="bg-veille-1 border border-white/10 rounded-xl p-3 flex items-center justify-between gap-3 hover:border-white/20 transition-colors"
            >
              <div class="flex items-center gap-3 flex-1">
                <div
                  class="w-12 h-12 bg-veille-3 rounded-lg flex items-center justify-center"
                >
                  <i class="fas fa-fire text-white text-lg"></i>
                </div>
                <div>
                  <p class="text-white font-semibold">Pompiers</p>
                  <p class="text-white/70 text-sm">18</p>
                </div>
              </div>
              <a
                href="tel:18"
                class="px-4 py-2 bg-veille-2 text-white font-semibold rounded-lg hover:bg-opacity-90 transition-all active:scale-95"
              >
                Appeler
              </a>
            </div>

            <!-- SAMU -->
            <div
              class="bg-veille-1 border border-white/10 rounded-xl p-3 flex items-center justify-between gap-3 hover:border-white/20 transition-colors"
            >
              <div class="flex items-center gap-3 flex-1">
                <div
                  class="w-12 h-12 bg-veille-3 rounded-lg flex items-center justify-center"
                >
                  <i class="fas fa-ambulance text-white text-lg"></i>
                </div>
                <div>
                  <p class="text-white font-semibold">SAMU</p>
                  <p class="text-white/70 text-sm">15</p>
                </div>
              </div>
              <a
                href="tel:15"
                class="px-4 py-2 bg-veille-2 text-white font-semibold rounded-lg hover:bg-opacity-90 transition-all active:scale-95"
              >
                Appeler
              </a>
            </div>

            <!-- Police -->
            <div
              class="bg-veille-1 border border-white/10 rounded-xl p-3 flex items-center justify-between gap-3 hover:border-white/20 transition-colors"
            >
              <div class="flex items-center gap-3 flex-1">
                <div
                  class="w-12 h-12 bg-veille-3 rounded-lg flex items-center justify-center"
                >
                  <i class="fas fa-shield text-white text-lg"></i>
                </div>
                <div>
                  <p class="text-white font-semibold">Police</p>
                  <p class="text-white/70 text-sm">17</p>
                </div>
              </div>
              <a
                href="tel:17"
                class="px-4 py-2 bg-veille-2 text-white font-semibold rounded-lg hover:bg-opacity-90 transition-all active:scale-95"
              >
                Appeler
              </a>
            </div>

            <!-- Numéro d'urgence européen -->
            <div
              class="bg-veille-1 border border-white/10 rounded-xl p-3 flex items-center justify-between gap-3 hover:border-white/20 transition-colors"
            >
              <div class="flex items-center gap-3 flex-1">
                <div
                  class="w-12 h-12 bg-veille-3 rounded-lg flex items-center justify-center"
                >
                  <i class="fas fa-globe text-white text-lg"></i>
                </div>
                <div>
                  <p class="text-white font-semibold">Urgence européenne</p>
                  <p class="text-white/70 text-sm">112</p>
                </div>
              </div>
              <a
                href="tel:112"
                class="px-4 py-2 bg-veille-2 text-white font-semibold rounded-lg hover:bg-opacity-90 transition-all active:scale-95"
              >
                Appeler
              </a>
            </div>
          </div>
        </section>
      </div>
    </main>

    <footer>
      <!-- Navbar -->
      <div class="fixed bottom-0 left-0 w-full">
        <div class="navbar-font bg bg-veille-4 mb-2 mx-4">
          <ul
            class="navbar bg-veille-3 flex items-center justify-center rounded-2xl"
          >
            <li
              class="navbar-home w-16 h-8 bg-veille-1 rounded-xl flex items-center justify-center m-1.5"
            >
              <a
                href="index.html"
                class="block w-full h-full flex items-center justify-center"
              >
                <i class="fa-solid fa-house text-xl text-white"></i>
              </a>
            </li>
            <li
              class="navbar-preparation w-16 h-8 bg-veille-1 rounded-xl flex items-center justify-center m-1.5"
            >
              <a
                href="preparation.html"
                class="block w-full h-full flex items-center justify-center"
              >
                <i class="fa-solid fa-shield text-xl text-white"></i>
              </a>
            </li>
            <li
              class="navbar-alert w-16 h-8 bg-veille-1 rounded-xl flex items-center justify-center m-1.5"
            >
              <a
                href="alert.html"
                class="block w-full h-full flex items-center justify-center"
              >
                <i class="fa-solid fa-bell text-xl text-white"></i>
              </a>
            </li>
            <li
              class="navbar-emergency w-16 h-8 bg-veille-1 rounded-xl flex items-center justify-center m-1.5"
              aria-current="page"
            >
              <span
                class="block w-full h-full flex items-center justify-center"
              >
                <i class="fa-solid fa-phone text-xl text-veille-2"></i>
              </span>
            </li>
          </ul>
        </div>
      </div>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
